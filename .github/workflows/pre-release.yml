name: Pre-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Pre-release version (e.g. 2.0.0-rc.1)"
        required: true
        type: string
      lspVersion:
        description: "lsp version to bundle"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            archive_ext: tar.gz
          - os: linux
            arch: arm64
            archive_ext: tar.gz
          - os: darwin
            arch: amd64
            archive_ext: tar.gz
          - os: darwin
            arch: arm64
            archive_ext: tar.gz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download lsp
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p bin
          LSP_VERSION="${{ inputs.lspVersion }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          EXT="${{ matrix.archive_ext }}"
          ARCHIVE="lsp_${OS}_${ARCH}.${EXT}"

          gh release download "v${LSP_VERSION}" \
            --repo infracost/lsp \
            --pattern "${ARCHIVE}" \
            --dir /tmp

          EXTRACT_DIR=$(mktemp -d)
          tar xzf "/tmp/${ARCHIVE}" -C "${EXTRACT_DIR}"

          find "${EXTRACT_DIR}" -name "infracost-ls" -type f -exec mv {} "bin/infracost-ls" \;
          chmod +x "bin/infracost-ls"
          rm -rf "${EXTRACT_DIR}"

      - name: List bin contents
        run: ls -la bin/

      - name: Set version
        run: sed -i "s/pluginVersion = .*/pluginVersion = ${{ inputs.version }}/" gradle.properties

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: build/distributions/*.zip

  release:
    name: Create Pre-release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          for dir in artifacts/*/; do
            target=$(basename "$dir")
            for file in "$dir"*.zip; do
              base=$(basename "$file" .zip)
              mv "$file" "artifacts/${base}-${target}.zip"
            done
          done

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ inputs.version }}" \
            --prerelease \
            --generate-notes \
            artifacts/*.zip
