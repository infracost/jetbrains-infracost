name: Pre-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Pre-release version (e.g. 2.0.0-rc.1)"
        required: true
        type: string
      lspVersion:
        description: "lsp version to bundle"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set version
        run: sed -i "s/pluginVersion = .*/pluginVersion = ${{ inputs.version }}/" gradle.properties

      - name: Build plugin
        env:
          LSP_VERSION: ${{ inputs.lspVersion }}
        run: ./gradlew buildPlugin

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: build/distributions/*.zip

  release:
    name: Create Pre-release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ inputs.version }}" \
            --prerelease \
            --generate-notes \
            artifacts/plugin/*.zip
